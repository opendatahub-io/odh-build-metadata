apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "workbenches-operator.prefixed" (list . "manager-rolebinding") }}
  labels:
    {{- include "workbenches-operator.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "workbenches-operator.managerClusterRoleName" . }}
subjects:
  - kind: ServiceAccount
    name: {{ include "workbenches-operator.serviceAccountName" . }}
    namespace: {{ .Values.operatorNamespace | quote }}
