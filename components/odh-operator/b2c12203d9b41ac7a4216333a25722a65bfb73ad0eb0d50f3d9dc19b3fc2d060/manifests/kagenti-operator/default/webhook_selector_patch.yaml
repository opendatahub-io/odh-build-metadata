# This patch adds namespace and object selectors to the mutating webhook
# to prevent it from intercepting ALL pod CREATEs cluster-wide.
# Only pods in kagenti-enabled namespaces with kagenti.io/type labels are intercepted.
apiVersion: admissionregistration.k8s.io/v1
kind: MutatingWebhookConfiguration
metadata:
  name: mutating-webhook-configuration
webhooks:
- name: inject.kagenti.io
  namespaceSelector:
    matchExpressions:
    - key: kubernetes.io/metadata.name
      operator: NotIn
      values:
      - kube-system
      - kube-public
      - kube-node-lease
      - kagenti-operator-system
    matchLabels:
      kagenti-enabled: "true"
  objectSelector:
    matchExpressions:
    - key: kagenti.io/type
      operator: In
      values:
      - agent
      - tool
    - key: kagenti.io/inject
      operator: NotIn
      values:
      - disabled
  timeoutSeconds: 10
