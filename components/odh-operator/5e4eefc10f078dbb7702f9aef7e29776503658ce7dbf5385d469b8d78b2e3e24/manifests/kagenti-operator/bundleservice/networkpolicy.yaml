apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: bundle-service
  namespace: system
spec:
  podSelector:
    matchLabels:
      app: bundle-service
  policyTypes:
    - Ingress
    - Egress
  ingress:
    # Only allow traffic from pods with the authbridge label
    - from:
        - podSelector:
            matchLabels:
              kagenti.dev/authbridge: "true"
          namespaceSelector: {}
      ports:
        - protocol: TCP
          port: 8080
  egress:
    # Allow DNS resolution
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
          podSelector:
            matchLabels:
              k8s-app: kube-dns
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    # Allow access to Kubernetes API server
    - to:
        - ipBlock:
            cidr: 0.0.0.0/0
      ports:
        - protocol: TCP
          port: 443
        - protocol: TCP
          port: 6443
