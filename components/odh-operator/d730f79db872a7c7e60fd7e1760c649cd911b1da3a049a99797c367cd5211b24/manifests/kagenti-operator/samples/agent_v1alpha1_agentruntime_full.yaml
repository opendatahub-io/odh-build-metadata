# Full AgentRuntime: enroll a Deployment as an agent with per-workload overrides.
# Overrides the SPIFFE trust domain for this workload.
apiVersion: agent.kagenti.dev/v1alpha1
kind: AgentRuntime
metadata:
  name: weather-agent-runtime
  namespace: default
  labels:
    app.kubernetes.io/name: weather-agent
spec:
  type: agent
  targetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: weather-agent
  identity:
    spiffe:
      trustDomain: custom.example.com
