apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: kagenti-bundle-service
rules:
  - apiGroups:
      - agent.kagenti.dev
    resources:
      - authorizationpolicies
    verbs:
      - get
      - list
      - watch
  - apiGroups:
      - agent.kagenti.dev
    resources:
      - authorizationpolicies/status
    verbs:
      - get
      - update
      - patch
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: kagenti-bundle-service
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: kagenti-bundle-service
subjects:
  - kind: ServiceAccount
    name: bundle-service
    namespace: system
