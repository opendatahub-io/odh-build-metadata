apiVersion: apps/v1
kind: Deployment
metadata:
  name: bundle-service
  namespace: system
  labels:
    app: bundle-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: bundle-service
  template:
    metadata:
      labels:
        app: bundle-service
    spec:
      serviceAccountName: bundle-service
      securityContext:
        runAsNonRoot: true
      containers:
        - name: bundle-service
          image: ghcr.io/kagenti/bundle-service:latest
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          env:
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: LOG_LEVEL
              value: info
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 2
            periodSeconds: 5
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              memory: 256Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
